version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER:-financeiro-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo-web:
    image: odoo:19
    container_name: ${ODOO_WEB_CONTAINER:-financeiro-odoo-web}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8069}:8069"
    volumes:
      - /proj_financeiro_odoo:/proj_financeiro_odoo
      - odoo_web_data:/var/lib/odoo
    environment:
      ODOO_DB_HOST: ${ODOO_DB_HOST:-db}
      ODOO_DB_PORT: ${ODOO_DB_PORT:-5432}
      ODOO_DB_USER: ${ODOO_DB_USER:-odoo}
      ODOO_DB_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    command: ["bash", "/proj_financeiro_odoo/deploy/start-web.sh"]
    restart: unless-stopped

  odoo-tests:
    image: odoo:19
    container_name: ${ODOO_TESTS_CONTAINER:-financeiro-odoo-tests}
    depends_on:
      db:
        condition: service_healthy
    profiles: ["test"]
    volumes:
      - /proj_financeiro_odoo:/proj_financeiro_odoo
    environment:
      ODOO_DB_HOST: ${ODOO_DB_HOST:-db}
      ODOO_DB_PORT: ${ODOO_DB_PORT:-5432}
      ODOO_DB_USER: ${ODOO_DB_USER:-odoo}
      ODOO_DB_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      ODOO_TEST_DB: ${ODOO_TEST_DB:-odoo_test_financeiro}
      ODOO_TEST_MODULES: ${ODOO_TEST_MODULES:-custom_financial_base,custom_treasury,custom_treasury_cash,custom_treasury_bank,custom_account_receivable,custom_account_payable,custom_financial_integration,custom_treasury_reconciliation,custom_account_receivable_collection,custom_financial_reports}
      ODOO_TEST_TAGS: ${ODOO_TEST_TAGS:-}
      ODOO_TEST_HTTP_PORT: ${ODOO_TEST_HTTP_PORT:-8090}
    command: ["bash", "/proj_financeiro_odoo/deploy/run-tests.sh"]
    restart: "no"

volumes:
  postgres_data:
  odoo_web_data:
